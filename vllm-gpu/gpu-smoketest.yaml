apiVersion: v1
kind: Pod
metadata:
  name: gpu-smoketest
  labels:
    app: gpu-smoketest
spec:
  restartPolicy: Never
  nodeSelector:
    cloud.google.com/compute-class: gpu-t4
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    - key: cloud.google.com/gke-spot
      operator: Equal
      value: "true"
      effect: NoSchedule
  containers:
    - name: cuda
      image: nvidia/cuda:12.2.2-base-ubuntu22.04
      command: ["/bin/sh", "-c"]
      args:
        - |
          nvidia-smi
          echo "--- sleeping to keep the node warm for describe ---"
          sleep 600
      resources:
        limits:
          nvidia.com/gpu: 1
