apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: distilbert-v1
  namespace: default
spec:
  predictor:
    model:
      modelFormat:
        name: huggingface
      args:
        - --task=sequence_classification
      storageUri: hf://distilbert/distilbert-base-uncased-finetuned-sst-2-english
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
